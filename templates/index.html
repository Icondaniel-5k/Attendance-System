<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<title>AttendPro Dashboard</title>
</head>

<body class="bg-gray-950 text-white flex">

<!-- =========================
SIDEBAR
========================= -->
<div id="sidebar" class="bg-gray-900 h-screen w-64 p-4 transition-all duration-300">

<!-- LOGO -->
<div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-bold">AttendPro</h1>
    <button onclick="toggleSidebar()" class="text-gray-400">
        <i class="fa fa-bars"></i>
    </button>
</div>

<!-- NAV -->
<nav class="space-y-2">

<a href="/dashboard"
   class="flex items-center gap-3 p-2 rounded hover:bg-gray-800
   {% if active_page=='dashboard' %}bg-gray-800{% endif %}">
    <i class="fa fa-gauge"></i>
    <span class="nav-text">Dashboard</span>
</a>

<a href="/report"
   class="flex items-center gap-3 p-2 rounded hover:bg-gray-800
   {% if active_page=='report' %}bg-gray-800{% endif %}">
    <i class="fa fa-chart-line"></i>
    <span class="nav-text">Report</span>
</a>

<a href="/export"
   class="flex items-center gap-3 p-2 rounded hover:bg-gray-800">
    <i class="fa fa-file-excel"></i>
    <span class="nav-text">Export</span>
</a>

<a href="/logout"
   class="flex items-center gap-3 p-2 rounded hover:bg-red-600 mt-6">
    <i class="fa fa-right-from-bracket"></i>
    <span class="nav-text">Logout</span>
</a>

</nav>
</div>

<!-- =========================
MAIN CONTENT
========================= -->
<div class="flex-1 p-6">

<!-- TOAST NOTIFICATION -->
{% if flash %}
<div id="toast"
     class="fixed top-5 right-5 bg-green-600 text-white px-4 py-3 rounded shadow-lg z-50">
    {{ flash }}
</div>

<script>
setTimeout(() => {
    const t = document.getElementById("toast");
    if (t) t.style.display = "none";
}, 3000);
</script>
{% endif %}

<!-- HEADER -->
<h1 class="text-3xl font-bold mb-6">Dashboard</h1>

<!-- ADD STAFF -->
<form method="POST" action="/add_staff" class="flex gap-2 mb-6">
    <input name="name" placeholder="Staff Name"
           class="p-2 rounded text-black w-1/3">

    <input name="salary" placeholder="Salary"
           class="p-2 rounded text-black w-1/3">

    <button class="bg-green-600 px-4 py-2 rounded">
        Add Staff
    </button>
</form>

<!-- CLOCK SYSTEM -->
<form method="POST" action="/clock" class="flex gap-2 mb-6">
    <select name="staff_id" class="p-2 rounded text-black w-1/3">
        {% for s in staff %}
        <option value="{{s['id']}}">{{s['name']}}</option>
        {% endfor %}
    </select>

    <button name="action" value="in"
            class="bg-blue-600 px-4 py-2 rounded">
        Clock IN
    </button>

    <button name="action" value="out"
            class="bg-red-600 px-4 py-2 rounded">
        Clock OUT
    </button>
</form>

<!-- ACTIVE STAFF -->
<h2 class="text-xl font-semibold mb-2">Active Staff</h2>

<div class="bg-gray-900 rounded p-4 mb-6">
{% for s in staff %}
<div class="flex justify-between items-center border-b border-gray-800 py-2">
    <span>{{s['name']}}</span>
    <a href="/fire_staff/{{s['id']}}"
       class="text-red-400 hover:underline">
       Fire
    </a>
</div>
{% endfor %}
</div>

<!-- INACTIVE STAFF -->
<h2 class="text-xl font-semibold mb-2">Inactive Staff</h2>

<div class="bg-gray-900 rounded p-4">
{% for s in inactive_staff %}
<div class="flex justify-between items-center border-b border-gray-800 py-2">
    <span>{{s['name']}}</span>
    <a href="/rehire_staff/{{s['id']}}"
       class="text-green-400 hover:underline">
       Rehire
    </a>
</div>
{% endfor %}
</div>

</div>

<!-- =========================
SIDEBAR TOGGLE SCRIPT
========================= -->
<script>
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    const texts = document.querySelectorAll(".nav-text");

    if (sidebar.classList.contains("w-64")) {
        sidebar.classList.remove("w-64");
        sidebar.classList.add("w-20");
        texts.forEach(t => t.style.display = "none");
    } else {
        sidebar.classList.add("w-64");
        sidebar.classList.remove("w-20");
        texts.forEach(t => t.style.display = "inline");
    }
}
</script>

</body>
</html>
